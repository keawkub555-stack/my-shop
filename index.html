<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ร้านค้าออนไลน์</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🛍️ My Shop</h1>
    <p>ร้านค้าน่ารักๆ ของฉัน</p>
  </header>

  <main class="product-grid">
    <div class="product-card">
      <img src="images/images.jpg" alt="สินค้า 1">
      <h3>เด็กช่าง👺</h3>
      <p class="price">฿10</p>
    </div>

    <div class="product-card">
      <img src="images/images (1).jpg" alt="สินค้า 2">
      <h3>ทรงเขมร😘</h3>
      <p class="price">฿100</p>
    </div>

    <div class="product-card">
      <img src="images/images (2).jpg" alt="สินค้า 3">
      <h3>ทรงเอ👹</h3>
      <p class="price">฿1000</p>
    </div>
  </main>

  <footer>
    <p>GuMarkComtu</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
